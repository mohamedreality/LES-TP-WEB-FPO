<!DOCTYPE html>
<html>
<head>
    <title>Exercice 2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
        }
        h2 {
            color: #333;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 48%;
            padding: 10px;
            margin-right: 2%;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        #resetBtn {
            background-color: #2196F3;
            width: 48%;
            margin-right: 0;
        }
        #resetBtn:hover {
            background-color: #0b7dda;
        }
        p {
            font-size: 16px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        #message {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        #score {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<h2>🎮 Devinez un Nombre</h2>

<input type="number" id="guess" placeholder="Entrez un nombre entre 1 et 10" min="1" max="10">
<div>
    <button onclick="checkGuess()">Valider</button>
    <button id="resetBtn" onclick="resetGame()">Réinitialiser</button>
</div>

<p id="error"></p>
<p id="message"></p>
<p id="score"></p>

<script>
let nombreSecret;
let tentative;
let score = 0;

// Initialize the game on page load
function initGame() {
    nombreSecret = Math.floor(Math.random() * 10) + 1;
    tentative = 0;
    score = 0;
    document.getElementById("guess").value = "";
    document.getElementById("message").innerText = "";
    document.getElementById("score").innerText = "";
    document.getElementById("error").innerText = "";
}

function checkGuess() {
    const input = document.getElementById("guess").value;
    
    // Clear previous error
    document.getElementById("error").innerText = "";
    
    // Validation: Check if input is empty or not a number
    if (input === "" || isNaN(input)) {
        document.getElementById("error").innerText = "⚠️ Veuillez entrer un nombre valide !";
        return;
    }
    
    tentative = parseInt(input);
    
    // Validation: Check if number is in range
    if (tentative < 1 || tentative > 10) {
        document.getElementById("error").innerText = "⚠️ Le nombre doit être entre 1 et 10 !";
        return;
    }
    
    score++;

    if (tentative < nombreSecret) {
        document.getElementById("message").innerText = "📈 Plus grand !";
        document.getElementById("score").innerText = "Tentatives: " + score;
    } else if (tentative > nombreSecret) {
        document.getElementById("message").innerText = "📉 Plus petit !";
        document.getElementById("score").innerText = "Tentatives: " + score;
    } else {
        document.getElementById("message").innerText = "🎉 Bravo ! Vous avez trouvé en " + score + " tentative(s)";
        document.getElementById("score").innerText = "Le nombre secret était: " + nombreSecret;
        document.getElementById("guess").disabled = true;
    }
    
    // Clear input field
    document.getElementById("guess").value = "";
}

function resetGame() {
    document.getElementById("guess").disabled = false;
    initGame();
    document.getElementById("message").innerText = "Nouvelle partie commencée !";
}

// Allow pressing Enter to submit guess
document.getElementById("guess").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        checkGuess();
    }
});

// Initialize game when page loads
initGame();
</script>

</body>
</html>
